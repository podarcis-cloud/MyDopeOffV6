<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="color-scheme" content="light only"/>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
<title>Lucide · Profil Neuro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0d0d0d;--ink2:#2a2a2a;--ink3:#666;
  --red:#d4001a;--blue:#0f2f7a;--green:#1a6640;--orange:#b05800;--purple:#6a1060;
  --cream:#f7f5f0;--cream2:#ede9e0;--white:#fff;--border:#e0dbd0;
  color-scheme:light only;
  forced-color-adjust:none;
  --fa:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:#f7f5f0 !important;color:#0d0d0d !important;font-family:var(--fb);max-width:430px;margin:0 auto;min-height:100vh;}

.topbar{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:14px 20px;}
.btn-back{background:none;border:1.5px solid var(--border);border-radius:4px;padding:7px 13px;font-family:var(--fa);font-size:11px;color:var(--ink3);cursor:pointer;}
.btn-back:active{background:var(--cream2);}
.topbar-title{font-family:var(--fa);font-size:13px;font-weight:700;}

/* SCREENS */
.screen{display:none;padding:20px 20px 80px;}
.screen.active{display:block;animation:fadeUp .25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* HOME SCREEN */
.profile-hero{text-align:center;padding:24px 0 20px;}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:var(--ink);color:var(--white);font-family:var(--fa);font-size:32px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.profile-name{font-family:var(--fa);font-size:22px;font-weight:800;margin-bottom:4px;}
.profile-sub{font-size:13px;color:var(--ink3);}

.neuro-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.neuro-card{background:var(--white);border:1.5px solid var(--border);border-radius:4px;padding:14px;text-align:center;}
.neuro-val{font-family:var(--fa);font-size:28px;font-weight:800;margin-bottom:4px;}
.neuro-lbl{font-size:10px;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;}
.neuro-sub{font-size:11px;color:var(--ink3);margin-top:3px;}

.radar-wrap{background:var(--white);border:1.5px solid var(--border);border-radius:4px;padding:16px;margin-bottom:14px;}
.radar-title{font-family:var(--fa);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:14px;}
canvas#radar{display:block;margin:0 auto;}

.section-label{font-family:var(--fa);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin:14px 0 8px;}

.test-card{background:var(--white);border:1.5px solid var(--border);border-radius:4px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s,transform .15s;}
.test-card:active{transform:scale(.98);}
.test-icon{font-size:28px;flex-shrink:0;}
.test-info{flex:1;}
.test-name{font-family:var(--fa);font-size:14px;font-weight:700;margin-bottom:2px;}
.test-desc{font-size:11px;color:var(--ink3);}
.test-status{font-size:11px;font-family:var(--fa);padding:3px 8px;border-radius:2px;}
.test-status.done{background:rgba(26,102,64,.1);color:var(--green);border:1px solid rgba(26,102,64,.25);}
.test-status.todo{background:var(--cream2);color:var(--ink3);}

/* QUIZ SCREEN */
.q-header{margin-bottom:20px;}
.q-badge{font-family:var(--fa);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.q-title{font-family:var(--fa);font-size:20px;font-weight:800;margin-bottom:8px;}
.q-progress-bar{height:4px;background:var(--cream2);border-radius:2px;overflow:hidden;margin-bottom:20px;}
.q-progress-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s ease;}
.q-num{font-size:11px;color:var(--ink3);margin-bottom:10px;}
.q-text{font-family:var(--fa);font-size:16px;font-weight:700;line-height:1.4;margin-bottom:20px;}
.q-options{display:flex;flex-direction:column;gap:8px;}
.q-opt{width:100%;text-align:left;padding:13px 15px;background:var(--white);border:1.5px solid var(--border);border-radius:4px;font-family:var(--fb);font-size:14px;cursor:pointer;transition:border-color .15s,background .15s;}
.q-opt:active{border-color:var(--blue);background:rgba(15,47,122,.05);}
.q-science{background:rgba(15,47,122,.04);border:1px solid rgba(15,47,122,.12);border-radius:4px;padding:10px 12px;font-size:11px;color:var(--blue);line-height:1.55;margin-top:16px;}

/* RESULT SCREEN */
.result-header{text-align:center;padding:20px 0;}
.result-icon{font-size:56px;margin-bottom:12px;}
.result-title{font-family:var(--fa);font-size:26px;font-weight:800;margin-bottom:6px;}
.result-sub{font-size:13px;color:var(--ink3);line-height:1.6;}
.score-badge{display:inline-block;font-family:var(--fa);font-size:28px;font-weight:800;padding:12px 24px;border-radius:4px;margin:12px 0;}
.result-section{background:var(--white);border:1.5px solid var(--border);border-radius:4px;padding:14px;margin-bottom:10px;}
.result-section-title{font-family:var(--fa);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;}
.rec-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--cream2);}
.rec-item:last-child{border-bottom:none;}
.rec-icon{font-size:18px;flex-shrink:0;}
.rec-text{font-size:13px;line-height:1.5;color:var(--ink2);}
.rec-text strong{color:var(--ink);}

/* PROFILE COMPLETION */
.completion-bar-wrap{background:var(--white);border:1.5px solid var(--border);border-radius:4px;padding:14px;margin-bottom:14px;}
.completion-label{font-family:var(--fa);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;display:flex;justify-content:space-between;}
.completion-bar{height:8px;background:var(--cream2);border-radius:4px;overflow:hidden;}
.completion-fill{height:100%;background:var(--blue);border-radius:4px;transition:width .5s ease;}

.btn-primary{width:100%;padding:15px;font-family:var(--fa);font-size:14px;font-weight:700;background:var(--ink);color:var(--white);border:none;border-radius:4px;cursor:pointer;margin-top:8px;}
.btn-primary:active{opacity:.8;}
.btn-outline{width:100%;padding:13px;font-family:var(--fa);font-size:13px;background:transparent;border:1.5px solid var(--border);border-radius:4px;color:var(--ink3);cursor:pointer;margin-top:6px;}
.btn-outline:active{background:var(--cream2);}

/* NEURO PROFILE BARS */
.neuro-bar-row{margin-bottom:10px;}
.neuro-bar-head{display:flex;justify-content:space-between;margin-bottom:4px;}
.neuro-bar-name{font-size:12px;font-family:var(--fa);font-weight:700;}
.neuro-bar-val{font-size:12px;color:var(--ink3);}
.neuro-bar-track{height:8px;background:var(--cream2);border-radius:4px;overflow:hidden;}
.neuro-bar-fill{height:100%;border-radius:4px;transition:width .5s ease;}
</style>
<style id="lucide-override">
:root{
  --bg:#f5f3ff;--surface:#fff;
  --primary:#5b4cf5;--primary-dk:#4338ca;--primary-lt:rgba(91,76,245,.1);
  --teal:#0e9f9b;--teal-lt:rgba(14,159,155,.1);
  --danger:#dc2626;--danger-lt:rgba(220,38,38,.08);
  --warn:#d97706;--warn-lt:rgba(217,119,6,.08);
  --success:#059669;--success-lt:rgba(5,150,105,.09);
  --ink:#1e1b4b;--ink2:#374151;--ink3:#6b7280;
  --border:#e8e6f0;--surface2:#faf9ff;
  --shadow:0 1px 3px rgba(91,76,245,.1),0 1px 2px rgba(91,76,245,.06);
  --shadow-md:0 4px 16px rgba(91,76,245,.12);
  --r:14px;--r-sm:10px;
    /* Legacy var aliases */
  --cream:#f5f3ff;--cream2:#ede9ff;--white:#fff;
  --red:#dc2626;--blue:#5b4cf5;--purple:#6a1060;

}
html,body{background:#f5f3ff !important;color:#1e1b4b !important;font-family:'DM Sans',sans-serif;}
.topbar{background:#fff !important;border-bottom:1.5px solid #e8e6f0 !important;box-shadow:0 1px 8px rgba(91,76,245,.06);}
.topbar-title{font-family:'Syne',sans-serif;color:#1e1b4b !important;font-weight:700;font-size:13px;}
.topbar-tag{font-family:'Syne',sans-serif;font-size:9px;color:#9ca3af;letter-spacing:.1em;}
.btn-back{background:#f5f3ff !important;border:1.5px solid #e8e6f0 !important;border-radius:10px !important;color:#5b4cf5 !important;font-family:'Syne',sans-serif;padding:7px 13px;font-size:11px;cursor:pointer;}
.btn-back:hover{background:#ede9ff !important;}
.tabs{background:#fff !important;border-bottom:2px solid #e8e6f0 !important;}
.tab-btn{font-family:'Syne',sans-serif;}
.tab-btn.active{color:#5b4cf5 !important;border-bottom-color:#5b4cf5 !important;}
.section-label{font-family:'Syne',sans-serif;color:#6b7280;letter-spacing:.14em;text-transform:uppercase;font-size:10px;}
.stat-card,.chart-wrap,.log-form,.log-entry,.test-card,.q-card,.goal-card,
.result-section,.mission-card,.harm-card,.rdr-item,.donation-wrap,
.no-data,.tip-row,.score-list,.road-text,.impact-card,.neuro-card,
.completion-bar-wrap,.radar-wrap{
  background:#fff !important;border-color:#e8e6f0 !important;
  border-radius:12px !important;
  box-shadow:0 1px 3px rgba(91,76,245,.08) !important;
}
.btn-primary,.btn-log{background:#5b4cf5 !important;border-radius:10px !important;}
.btn-outline,.btn-log-clean,.modal-close-btn,.btn-back,.amount-btn{border-radius:10px !important;}
.streak-banner{background:linear-gradient(135deg,#5b4cf5,#4338ca) !important;border-radius:14px !important;}
.emergency-banner{border-radius:12px !important;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:64px;background:#fff;border-top:1px solid #e8e6f0;display:flex;z-index:9999;box-shadow:0 -4px 20px rgba(91,76,245,.07);}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-decoration:none;color:#9ca3af;padding:8px 4px;-webkit-tap-highlight-color:transparent;transition:color .15s;}
.bn-item svg{width:22px;height:22px;stroke-width:1.8;transition:stroke-width .15s;}
.bn-item span{font-family:'Syne',sans-serif;font-size:9px;letter-spacing:.04em;text-transform:uppercase;}
.bn-item.active{color:#5b4cf5;}
.bn-item.active svg{stroke-width:2.3;}
[class*="tab-panel"].active,[class*="screen"].active,.page,.page-pad,.tab-panel.active{padding-bottom:80px;}
</style>
</head>
<body>

<div class="topbar">
  <button class="btn-back" id="back-btn">← Retour</button>
  <div class="topbar-title">🧬 Profil Neuro</div>
  <span style="font-family:var(--fa);font-size:10px;color:var(--ink3);">V6</span>
</div>

<!-- SCREEN: HOME -->
<div id="screen-home" class="screen active">
  <div class="profile-hero">
    <div class="profile-avatar" id="avatar-initials">?</div>
    <div class="profile-name" id="profile-name">Ton profil</div>
    <div class="profile-sub" id="profile-sub">Complète les évaluations pour débloquer ton profil neurologique</div>
  </div>

  <div class="completion-bar-wrap">
    <div class="completion-label">
      <span>Profil complété</span>
      <span id="completion-pct">0%</span>
    </div>
    <div class="completion-bar">
      <div class="completion-fill" id="completion-fill" style="width:0%"></div>
    </div>
  </div>

  <div id="neuro-profile-section" style="display:none;">
    <div class="section-label">Profil neurologique</div>
    <div class="radar-wrap">
      <div class="radar-title">Axes neuro · basés sur tes évaluations</div>
      <canvas id="radar" width="280" height="200"></canvas>
    </div>
    <div class="section-label">Circuits impliqués</div>
    <div id="neuro-bars"></div>
  </div>

  <div class="section-label">Évaluations disponibles</div>
  <div id="tests-list"></div>
</div>

<!-- SCREEN: QUIZ -->
<div id="screen-quiz" class="screen">
  <div class="q-header">
    <div class="q-badge" id="q-badge">—</div>
    <div class="q-title" id="q-title">—</div>
    <div class="q-progress-bar"><div class="q-progress-fill" id="q-progress-fill" style="width:0%"></div></div>
  </div>
  <div class="q-num" id="q-num"></div>
  <div class="q-text" id="q-text"></div>
  <div class="q-options" id="q-options"></div>
  <div class="q-science" id="q-science" style="display:none;"></div>
</div>

<!-- SCREEN: RESULT -->
<div id="screen-result" class="screen">
  <div id="result-content"></div>
</div>

<script>
const params = new URLSearchParams(location.search);
const userName = params.get('name') || '';
const userRegion = params.get('region') || 'BE';

document.getElementById('back-btn').onclick = () => {
  if (currentScreen === 'home') {
    location.href = `index.html${userName ? '?name='+encodeURIComponent(userName)+'&region='+userRegion : ''}`;
  } else {
    showScreen('home');
  }
};

const PKEY = 'ctc_v6_profil';
function loadProfil() { try { return JSON.parse(localStorage.getItem(PKEY)) || {}; } catch(e){ return {}; } }
function saveProfil(d) { try { localStorage.setItem(PKEY, JSON.stringify(d)); } catch(e){} }

let currentScreen = 'home';
let activeTest = null;
let qIndex = 0;
let answers = [];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  currentScreen = id;
}

// ════════════════════════════════════════
// TESTS DEFINITIONS
// ════════════════════════════════════════
const TESTS = [
  {

      { q: "As-tu consommé illégalement pour te sentir mieux ?", sci: "Automédication : facteur de risque de dépendance.", opts: ["Non","Oui"], scores: [0,1] },

    ],

      { q: "Je dépense plus que prévu.", sci: "Impulsivité financière, lien avec l'addiction.", opts: ["Rarement","Parfois","Souvent","Presque toujours"], scores: [1,2,3,4] },

function getAxisScore(axisId) {
  const p = loadProfil();
  const tests = TESTS.filter(t => t.neuroAxis === axisId && p[t.id]);
  if (!tests.length) return null;
  const avg = tests.reduce((a,t) => {
    const res = t.interp(p[t.id].score);
    return a + (1 - res.level / 3);
  }, 0) / tests.length;
  return Math.round(avg * 100);
}

function renderNeuroBars() {
  document.getElementById('neuro-bars').innerHTML = Object.entries(NEURO_AXES).map(([id, axis]) => {
    const score = getAxisScore(id);
    if (score === null) return '';
    const color = score >= 70 ? 'var(--green)' : score >= 40 ? 'var(--orange)' : 'var(--red)';
    return `<div class="neuro-bar-row">
      <div class="neuro-bar-head">
        <div class="neuro-bar-name">${axis.label}</div>
        <div class="neuro-bar-val">${score}/100</div>
      </div>
      <div style="font-size:10px;color:var(--ink3);margin-bottom:4px;">${axis.desc}</div>
      <div class="neuro-bar-track">
        <div class="neuro-bar-fill" style="width:${score}%;background:${color};"></div>
      </div>
    </div>`;
  }).join('');
}

function drawRadar() {
  const canvas = document.getElementById('radar');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const cx = W/2, cy = H/2 + 10;
  const R = Math.min(W, H) / 2 - 30;
  const axes = Object.entries(NEURO_AXES);
  const N = axes.length;

  // Bg rings
  [0.25, 0.5, 0.75, 1].forEach(r => {
    ctx.beginPath();
    axes.forEach(([,], i) => {
      const angle = (i/N) * 2 * Math.PI - Math.PI/2;
      const x = cx + R * r * Math.cos(angle);
      const y = cy + R * r * Math.sin(angle);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.closePath();
    ctx.strokeStyle = 'rgba(0,0,0,0.07)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Axis lines
  axes.forEach(([, ax], i) => {
    const angle = (i/N) * 2 * Math.PI - Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R * Math.cos(angle), cy + R * Math.sin(angle));
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Labels
    const lx = cx + (R + 18) * Math.cos(angle);
    const ly = cy + (R + 18) * Math.sin(angle);
    ctx.font = `bold 9px Syne, sans-serif`;
    ctx.fillStyle = '#666';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ax.label.split(' ')[0], lx, ly);
  });

  // Data shape
  const scores = axes.map(([id]) => (getAxisScore(id) ?? 40) / 100);
  ctx.beginPath();
  axes.forEach(([,], i) => {
    const angle = (i/N) * 2 * Math.PI - Math.PI/2;
    const r = scores[i] * R;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.closePath();
  ctx.fillStyle = 'rgba(15,47,122,0.15)';
  ctx.fill();
  ctx.strokeStyle = '#0f2f7a';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Dots
  axes.forEach(([,], i) => {
    const angle = (i/N) * 2 * Math.PI - Math.PI/2;
    const r = scores[i] * R;
    ctx.beginPath();
    ctx.arc(cx + r*Math.cos(angle), cy + r*Math.sin(angle), 4, 0, Math.PI*2);
    ctx.fillStyle = '#0f2f7a';
    ctx.fill();
  });
}

// ── QUIZ ──
window.startTest = (id) => {
  activeTest = TESTS.find(t => t.id === id);
  qIndex = 0;
  answers = [];
  showScreen('quiz');
  renderQuestion();
};

function renderQuestion() {
  const q = activeTest.questions[qIndex];
  const total = activeTest.questions.length;
  document.getElementById('q-badge').textContent = activeTest.name + ' · ' + activeTest.duration;
  document.getElementById('q-title').textContent = activeTest.name;
  document.getElementById('q-progress-fill').style.width = (qIndex/total*100) + '%';
  document.getElementById('q-num').textContent = `Question ${qIndex+1} / ${total}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-options').innerHTML = q.opts.map((opt, i) =>
    `<button class="q-opt" onclick="answerQ(${i})">${opt}</button>`
  ).join('');
  const sciEl = document.getElementById('q-science');
  if (q.sci) { sciEl.textContent = '🔬 ' + q.sci; sciEl.style.display = 'block'; }
  else sciEl.style.display = 'none';
}

window.answerQ = (optIdx) => {
  answers.push(activeTest.questions[qIndex].scores[optIdx]);
  qIndex++;
  if (qIndex >= activeTest.questions.length) {
    finishTest();
  } else {
    renderQuestion();
  }
};

function finishTest() {
  const score = answers.reduce((a,b) => a+b, 0);
  const interp = activeTest.interp(score);
  const p = loadProfil();
  p[activeTest.id] = { score, label: interp.label, color: interp.color, date: new Date().toISOString().split('T')[0] };
  saveProfil(p);
  showScreen('result');
  renderResult(score, interp);
}

function renderResult(score, interp) {
  const recs = getRecommendations(activeTest.id, interp.level, score);
  document.getElementById('result-content').innerHTML = `
    <div class="result-header">
      <div class="result-icon">${activeTest.icon}</div>
      <div class="result-title">${activeTest.name}</div>
      <div style="margin:8px 0;">
        <span class="score-badge" style="background:${interp.color}20;color:${interp.color};border:2px solid ${interp.color};">${interp.label}</span>

}
