<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="color-scheme" content="light only"/>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
<title>Lucide · Fiches & Protocoles</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0d0d0d;--ink2:#2a2a2a;--ink3:#666;
  --red:#d4001a;--blue:#0f2f7a;--purple:#6a1060;--green:#1a6640;
  --cream:#f7f5f0;--cream2:#ede9e0;
  --white:#ffffff;--border:#e0dbd0;
  color-scheme:light only;
  forced-color-adjust:none;
  --fa:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:#f7f5f0 !important;color:#0d0d0d !important;font-family:var(--fb);max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px;border-bottom:1px solid var(--border);background:var(--white);}
.btn-back{background:none;border:1.5px solid var(--border);border-radius:4px;padding:8px 14px;font-family:var(--fa);font-size:12px;color:var(--ink3);cursor:pointer;}
.btn-back:active{background:var(--cream2);}
.topbar-tag{font-family:var(--fa);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);}

.page{padding:20px 20px 80px;}
.section-title{font-family:var(--fa);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;margin-top:20px;}
.section-title:first-child{margin-top:0;}

/* TABS */
.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid var(--border);}
.tab-btn{background:none;border:none;padding:10px 14px;font-family:var(--fa);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);cursor:pointer;margin-bottom:-2px;border-bottom:2px solid transparent;flex:1;text-align:center;}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);}
.tab-panel{display:none;}
.tab-panel.active{display:block;animation:fadeUp .25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* EXERCISE CARDS */
.ex-card{background:var(--white);border:1.5px solid var(--border);border-radius:4px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s,transform .15s;display:flex;align-items:center;gap:12px;}
.ex-card:active{transform:scale(.98);}
.ex-card.crisis{border-left:3px solid var(--red);}
.ex-card.daily{border-left:3px solid var(--blue);}
.ex-card.plasticity{border-left:3px solid var(--purple);}
.ex-icon{font-size:28px;flex-shrink:0;}
.ex-info{flex:1;}
.ex-name{font-family:var(--fa);font-size:14px;font-weight:700;margin-bottom:2px;}
.ex-tagline{font-size:11px;color:var(--ink3);line-height:1.4;}
.ex-meta{display:flex;gap:6px;margin-top:4px;}
.ex-badge{font-size:9px;font-family:var(--fa);padding:2px 6px;border-radius:2px;letter-spacing:.06em;text-transform:uppercase;}
.ex-badge.crisis{background:rgba(212,0,26,.08);color:var(--red);border:1px solid rgba(212,0,26,.2);}
.ex-badge.daily{background:rgba(15,47,122,.08);color:var(--blue);border:1px solid rgba(15,47,122,.2);}
.ex-badge.plasticity{background:rgba(106,16,96,.08);color:var(--purple);border:1px solid rgba(106,16,96,.2);}
.ex-duration{font-size:10px;color:var(--ink3);}
.ex-arrow{color:var(--ink3);font-size:14px;flex-shrink:0;}

/* EXERCISE DETAIL */
.ex-detail{background:var(--white);border:1.5px solid var(--border);border-radius:4px;padding:20px;margin-bottom:12px;}
.ex-detail-icon{font-size:48px;text-align:center;margin-bottom:12px;}
.ex-detail-name{font-family:var(--fa);font-weight:800;font-size:22px;margin-bottom:4px;}
.ex-detail-tagline{font-size:13px;color:var(--ink3);margin-bottom:16px;}
.info-block{background:var(--cream);border-radius:4px;padding:12px;margin-bottom:10px;}
.info-block-label{font-family:var(--fa);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.info-block-val{font-size:13px;line-height:1.6;color:var(--ink2);}
.info-block.science{border-left:3px solid var(--blue);}
.info-block.science .info-block-label{color:var(--blue);}

/* TIMER */
.timer-wrap{text-align:center;padding:20px 0;}
.timer-circle{width:120px;height:120px;margin:0 auto 16px;position:relative;}
.timer-svg{transform:rotate(-90deg);}
.timer-track{fill:none;stroke:var(--cream2);stroke-width:8;}
.timer-fill{fill:none;stroke:var(--red);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .5s ease;}
.timer-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.timer-secs{font-family:var(--fa);font-size:24px;font-weight:800;color:var(--ink);}
.timer-label{font-size:10px;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;}
.timer-message{font-family:var(--fa);font-size:16px;font-weight:700;color:var(--ink);min-height:24px;text-align:center;margin-bottom:16px;}

/* QUESTIONNAIRES */
.q-card{background:var(--white);border:1.5px solid var(--border);border-radius:4px;padding:14px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color .15s;}
.q-card:active{transform:scale(.98);}
.q-icon{font-size:28px;}
.q-info{flex:1;}
.q-name{font-family:var(--fa);font-size:14px;font-weight:700;margin-bottom:2px;}
.q-desc{font-size:11px;color:var(--ink3);}
.q-arrow{color:var(--ink3);}

/* QUESTIONNAIRE DETAIL */
.q-question{font-family:var(--fa);font-weight:700;font-size:15px;margin-bottom:12px;line-height:1.4;}
.q-option{display:block;width:100%;text-align:left;background:var(--white);border:1.5px solid var(--border);border-radius:4px;padding:12px 14px;font-family:var(--fb);font-size:14px;cursor:pointer;margin-bottom:6px;transition:border-color .15s,background .15s;}
.q-option:active,.q-option.selected{border-color:var(--blue);background:rgba(15,47,122,.05);}
.q-progress{display:flex;gap:4px;margin-bottom:16px;}
.q-dot{flex:1;height:4px;border-radius:2px;background:var(--cream2);}
.q-dot.done{background:var(--blue);}
.q-result{text-align:center;padding:24px 0;}
.q-result-label{font-family:var(--fa);font-size:22px;font-weight:800;margin-bottom:8px;}
.q-result-score{font-size:14px;color:var(--ink3);margin-bottom:20px;}

/* BUTTONS */
.btn-primary{width:100%;padding:16px;font-family:var(--fa);font-size:15px;font-weight:700;background:var(--ink);color:var(--white);border:none;border-radius:4px;cursor:pointer;margin-bottom:8px;}
.btn-primary:active{background:var(--ink2);}
.btn-outline{width:100%;padding:14px;font-family:var(--fa);font-size:14px;background:transparent;border:1.5px solid var(--border);border-radius:4px;color:var(--ink3);cursor:pointer;margin-bottom:8px;}
.btn-outline:active{background:var(--cream2);}
.btn-sm{display:inline-block;padding:8px 16px;font-family:var(--fa);font-size:12px;background:none;border:1.5px solid var(--border);border-radius:4px;color:var(--ink3);cursor:pointer;margin-right:6px;margin-bottom:6px;}
.btn-sm:active,.btn-sm.active{background:var(--ink);color:var(--white);border-color:var(--ink);}

/* SCREEN manager */
.screen{display:none;}
.screen.active{display:block;}
</style>

.stat-card,.chart-wrap,.log-form,.log-entry,.test-card,.q-card,.goal-card,
.result-section,.mission-card,.harm-card,.rdr-item,.donation-wrap,
.no-data,.tip-row,.score-list,.road-text,.impact-card,.neuro-card,

}

.streak-banner{background:linear-gradient(135deg,#5b4cf5,#4338ca) !important;border-radius:14px !important;}
.emergency-banner{border-radius:12px !important;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:64px;background:#fff;border-top:1px solid #e8e6f0;display:flex;z-index:9999;box-shadow:0 -4px 20px rgba(91,76,245,.07);}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-decoration:none;color:#9ca3af;padding:8px 4px;-webkit-tap-highlight-color:transparent;transition:color .15s;}
.bn-item svg{width:22px;height:22px;stroke-width:1.8;transition:stroke-width .15s;}
.bn-item span{font-family:'Syne',sans-serif;font-size:9px;letter-spacing:.04em;text-transform:uppercase;}

.bn-item.active svg{stroke-width:2.3;}
[class*="tab-panel"].active,[class*="screen"].active,.page,.page-pad,.tab-panel.active{padding-bottom:80px;}
</style>
</head>

<script>
// ===== URL PARAMS =====
const params = new URLSearchParams(location.search);
const userName = params.get('name') || '';
const userRegion = params.get('region') || 'BE';

const KEY = 'ctc_v6';
function loadData() { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e){ return {}; } }
function saveData(d) { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch(e){} }

// ===== NAVIGATION =====
let currentScreen = 'hub';
let hubTab = 'exercises';
let activeTimerInterval = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  currentScreen = id;
}

document.getElementById('global-back').onclick = () => {
  if (currentScreen === 'hub') {
    location.href = `index.html${userName ? '?name='+encodeURIComponent(userName)+'&region='+userRegion : ''}`;
  } else {
    if (activeTimerInterval) clearInterval(activeTimerInterval);
    showScreen('hub');
    document.getElementById('topbar-tag').textContent = 'FICHES & PROTOCOLES';
  }
};

// ===== TABS =====
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    hubTab = btn.dataset.tab;
    document.getElementById('tab-' + hubTab).classList.add('active');

  };
});

function renderExercises() {
  const crisis = EXERCISES.filter(e => e.type === 'crisis');
  const daily = EXERCISES.filter(e => e.type === 'daily');
  const plasticity = EXERCISES.filter(e => e.type === 'plasticity');
  document.getElementById('ex-crisis-list').innerHTML = crisis.map(exCard).join('');
  document.getElementById('ex-daily-list').innerHTML = daily.map(exCard).join('');
  document.getElementById('ex-plasticity-list').innerHTML = plasticity.map(exCard).join('');
}

function exCard(ex) {
  return `<div class="ex-card ${ex.type}" onclick="openExercise('${ex.id}')">
    <div class="ex-icon">${ex.emoji}</div>
    <div class="ex-info">
      <div class="ex-name">${ex.name}</div>
      <div class="ex-tagline">${ex.tagline}</div>
      <div class="ex-meta">
        <span class="ex-badge ${ex.type}">${ex.type === 'crisis' ? 'Crise' : ex.type === 'daily' ? 'Quotidien' : 'Plasticité'}</span>
        <span class="ex-duration">${ex.duration}s</span>
      </div>
    </div>
    <div class="ex-arrow">→</div>
  </div>`;
}

window.openExercise = (id) => {
  const ex = EXERCISES.find(e => e.id === id);
  if (!ex) return;
  document.getElementById('topbar-tag').textContent = ex.name.toUpperCase();
  const circum = 2 * Math.PI * 52;
  document.getElementById('ex-detail-content').innerHTML = `
    <div class="ex-detail">
      <div class="ex-detail-icon">${ex.emoji}</div>
      <div class="ex-detail-name">${ex.name}</div>
      <div class="ex-detail-tagline">${ex.tagline}</div>
      <div class="info-block">
        <div class="info-block-label">🧠 Zone ciblée</div>
        <div class="info-block-val">${ex.zone}</div>
      </div>
      <div class="info-block">
        <div class="info-block-label">📋 Instructions</div>
        <div class="info-block-val">${ex.instruction}</div>
      </div>
      <div class="info-block science">
        <div class="info-block-label">🔬 Science</div>
        <div class="info-block-val">${ex.science}</div>
      </div>
    </div>
    <div class="timer-wrap">
      <div class="timer-circle">
        <svg class="timer-svg" width="120" height="120" viewBox="0 0 120 120">
          <circle class="timer-track" cx="60" cy="60" r="52"/>
          <circle class="timer-fill" id="timer-fill" cx="60" cy="60" r="52"
            stroke-dasharray="${circum}" stroke-dashoffset="${circum}"/>
        </svg>
        <div class="timer-text">
          <div class="timer-secs" id="timer-secs">${ex.duration}</div>
          <div class="timer-label">sec</div>
        </div>
      </div>
      <div class="timer-message" id="timer-msg">${ex.messages[0]}</div>
      <button class="btn-primary" id="timer-start" onclick="startTimer(${ex.duration},'${ex.id}')">▶ Démarrer</button>
      <button class="btn-outline" onclick="document.getElementById('global-back').click()">← Retour</button>
    </div>
  `;
  showScreen('ex');
};

let timerRunning = false;
window.startTimer = (duration, exId) => {
  if (timerRunning) return;
  timerRunning = true;
  const ex = EXERCISES.find(e => e.id === exId);
  const circum = 2 * Math.PI * 52;
  let remaining = duration;
  let elapsed = 0;
  const fill = document.getElementById('timer-fill');
  const secsEl = document.getElementById('timer-secs');
  const msgEl = document.getElementById('timer-msg');
  const btn = document.getElementById('timer-start');
  btn.textContent = 'En cours…';
  btn.style.opacity = '.5';
  btn.style.pointerEvents = 'none';
  const msgInterval = Math.floor(duration / ex.messages.length);
  activeTimerInterval = setInterval(() => {
    remaining--;
    elapsed++;
    secsEl.textContent = remaining;
    const progress = elapsed / duration;
    fill.style.strokeDashoffset = circum * (1 - progress);
    const msgIdx = Math.min(ex.messages.length - 1, Math.floor(elapsed / msgInterval));
    msgEl.textContent = ex.messages[msgIdx];
    if (remaining <= 0) {
      clearInterval(activeTimerInterval);
      timerRunning = false;
      secsEl.textContent = '✓';
      msgEl.textContent = '✓ Exercice terminé !';
      btn.textContent = '← Retour';
      btn.style.opacity = '1';
      btn.style.pointerEvents = 'all';
      btn.onclick = () => document.getElementById('global-back').click();
      // Save
      const d = loadData();
      const sessions = d.sessions || [];
      sessions.push({ type:'ex', name: ex.name, date: Date.now() });
      d.sessions = sessions;
      d.score = (d.score || 0) + 2;
      saveData(d);
    }
  }, 1000);
};

// ===== QUESTIONNAIRES =====
const QS = [
  {id:"craving",name:"Bilan Craving",icon:"🌡",desc:"Intensité, fréquence, résistance",color:"var(--red)",questions:[

    {q:"Fréquence des épisodes ?",opts:["Rare","Quelques fois","Quotidien","Plusieurs fois/j","Quasi permanent"],scores:[1,2,3,4,5]},
    {q:"Tu as résisté à des envies ?",opts:["Toujours","Souvent","Environ la moitié","Rarement","Jamais"],scores:[5,4,3,2,1]}
  ],interp:s=>s<=5?{label:"Semaine stable",color:"var(--blue)"}:s<=9?{label:"Semaine difficile",color:"#b05800"}:{label:"Semaine intense",color:"var(--red)"}},
  {id:"audit",name:"AUDIT-C Alcool",icon:"⚗",desc:"Questionnaire de référence OMS",color:"var(--blue)",questions:[
    {q:"Fréquence de consommation ?",opts:["Jamais","1x/mois ou moins","2–4x/mois","2–3x/semaine","4x+/semaine"],scores:[0,1,2,3,4]},
    {q:"Verres standard par occasion ?",opts:["1–2","3–4","5–6","7–9","10+"],scores:[0,1,2,3,4]},
    {q:"Fréquence de 6 verres+ ?",opts:["Jamais","Moins d'1x/mois","1x/mois","1x/semaine","Presque chaque jour"],scores:[0,1,2,3,4]}
  ],interp:s=>s<=2?{label:"Faible risque",color:"var(--green)"}:s<=5?{label:"Risque modéré",color:"#b05800"}:{label:"Risque élevé",color:"var(--red)"}},
  {id:"wellbeing",name:"Bien-être WHO-5",icon:"✦",desc:"Outil validé de l'OMS",color:"var(--purple)",questions:[
    {q:"De bonne humeur la plupart du temps ?",opts:["Jamais","Rarement","Parfois","Souvent","Tout le temps"],scores:[0,1,2,3,4]},
    {q:"Calme et serein(e) ?",opts:["Jamais","Rarement","Parfois","Souvent","Tout le temps"],scores:[0,1,2,3,4]},
    {q:"Actif(ve) et plein(e) d'énergie ?",opts:["Jamais","Rarement","Parfois","Souvent","Tout le temps"],scores:[0,1,2,3,4]},
    {q:"Réveil reposé et rafraîchi(e) ?",opts:["Jamais","Rarement","Parfois","Souvent","Tout le temps"],scores:[0,1,2,3,4]},
    {q:"Vie quotidienne remplie d'intérêt ?",opts:["Jamais","Rarement","Parfois","Souvent","Tout le temps"],scores:[0,1,2,3,4]}
  ],interp:s=>s<=8?{label:"Détresse possible",color:"var(--red)"}:s<=14?{label:"Bien-être moyen",color:"#b05800"}:{label:"Bien-être satisfaisant",color:"var(--green)"}}
];

function renderQuestionnaires() {
  document.getElementById('q-list').innerHTML = QS.map(q => `
    <div class="q-card" onclick="openQ('${q.id}')">
      <div class="q-icon">${q.icon}</div>
      <div class="q-info">
        <div class="q-name">${q.name}</div>
        <div class="q-desc">${q.desc}</div>
      </div>
      <div class="q-arrow" style="color:${q.color}">→</div>
    </div>
  `).join('');
  renderQHistory();
}

function renderQHistory() {
  const d = loadData();
  const qs = (d.sessions || []).filter(s => s.type === 'q').slice(-5).reverse();
  const el = document.getElementById('q-history');
  if (!qs.length) { el.textContent = 'Aucun bilan enregistré.'; return; }
  el.innerHTML = qs.map(s => {
    const date = new Date(s.date).toLocaleDateString('fr-FR');
    return `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--cream2);">
      <span>${s.name}</span><span style="color:${s.color || 'var(--ink3)'};">${s.label} · ${date}</span>
    </div>`;
  }).join('');
}

let qState = { q: null, idx: 0, answers: [] };
window.openQ = (id) => {
  const q = QS.find(x => x.id === id);
  qState = { q, idx: 0, answers: [] };
  document.getElementById('topbar-tag').textContent = q.name.toUpperCase();
  renderQStep();
  showScreen('q');
};

function renderQStep() {
  const { q, idx, answers } = qState;
  const step = q.questions[idx];
  const dots = q.questions.map((_, i) => `<div class="q-dot${i < idx ? ' done' : ''}"></div>`).join('');
  document.getElementById('q-detail-content').innerHTML = `
    <div style="margin-bottom:16px;">
      <div class="q-progress">${dots}</div>
      <div style="font-size:11px;color:var(--ink3);margin-bottom:12px;">${idx+1} / ${q.questions.length}</div>
      <div class="q-question">${step.q}</div>
      ${step.opts.map((opt, i) => `
        <button class="q-option" onclick="answerQ(${i})">${opt}</button>
      `).join('')}
    </div>
    <button class="btn-outline" onclick="document.getElementById('global-back').click()">← Annuler</button>
  `;
}

window.answerQ = (optIdx) => {
  const { q } = qState;
  const step = q.questions[qState.idx];
  qState.answers.push(step.scores[optIdx]);
  qState.idx++;
  if (qState.idx >= q.questions.length) {
    showQResult();
  } else {
    renderQStep();
  }
};

function showQResult() {
  const { q, answers } = qState;
  const total = answers.reduce((a, b) => a + b, 0);
  const interp = q.interp(total);
  document.getElementById('q-detail-content').innerHTML = `
    <div class="ex-detail">
      <div class="ex-detail-icon">${q.icon}</div>
      <div class="ex-detail-name">${q.name}</div>
    </div>
    <div class="q-result">
      <div class="q-result-label" style="color:${interp.color}">${interp.label}</div>
      <div class="q-result-score">Score : ${total} / ${answers.length * 4}</div>
      <div style="margin-bottom:24px;font-size:13px;color:var(--ink3);line-height:1.6;">
        Ce score est une indication. Parle-en à un professionnel de santé si nécessaire.
      </div>
      <button class="btn-primary" onclick="document.getElementById('global-back').click()">← Retour</button>
    </div>
  `;
  // Save
  const d = loadData();
  const sessions = d.sessions || [];
  sessions.push({ type:'q', name: q.name, date: Date.now(), label: interp.label, color: interp.color, score: total });
  d.sessions = sessions;
  saveData(d);
}

// ===== INIT =====
renderExercises();
renderQuestionnaires();
</script>
